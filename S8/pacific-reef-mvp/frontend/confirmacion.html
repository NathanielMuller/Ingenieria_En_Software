<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacific Reef | Confirmacion</title>
    <link href="assets/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <main class="container section-space">
        <div class="row justify-content-center">
            <div class="col-xl-9">
                <div class="content-card p-4 p-lg-5 confirmation-card text-center">
                    <div class="confirmation-icon mb-4">OK</div>
                    <span class="eyebrow">Vista 6</span>
                    <h1 class="display-title mb-3" id="confirmation-title">Cargando confirmacion...</h1>
                    <p class="lead-copy mx-auto mb-4 confirmation-copy">El sistema registra el pago inicial, genera el ticket y deja disponible el codigo QR para control de acceso y validacion.</p>

                    <div class="row g-4 text-start mt-2">
                        <div class="col-lg-7">
                            <div class="soft-panel h-100" id="confirmation-summary">
                                <h2 class="h5 mb-3">Resumen final</h2>
                                <div class="summary-line"><span>Estado</span><strong>Consultando reserva...</strong></div>
                            </div>
                        </div>
                        <div class="col-lg-5">
                            <div class="qr-card h-100">
                                <img class="img-fluid rounded" id="confirmation-qr-image" alt="QR de la reserva">
                                <p class="mb-0 text-muted" id="confirmation-qr-text">Codigo para validacion de la reserva en recepcion.</p>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 flex-wrap mt-5">
                        <a class="btn btn-brand btn-lg" href="index.html">Volver al inicio</a>
                        <a class="btn btn-outline-brand btn-lg" href="admin.html">Ver panel admin</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="assets/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/app-init.js"></script>
    <script type="module" src="assets/js/pages/confirmation-page.js"></script>
</body>
</html>
